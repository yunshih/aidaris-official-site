name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Copy source to dist
        run: |
          cp -r . dist/
          rm -rf dist/.git dist/node_modules dist/.github dist/package*.json dist/build.js dist/dist

      - name: Minify CSS
        run: |
          npx postcss dist/style.css --use cssnano -o dist/style.css
          npx postcss dist/assets/css/text-to-speech.css --use cssnano -o dist/assets/css/text-to-speech.css

      - name: Minify JS
        run: |
          npx terser dist/script.js -o dist/script.js --compress --mangle
          npx terser dist/assets/js/text-to-speech.js -o dist/assets/js/text-to-speech.js --compress --mangle

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
