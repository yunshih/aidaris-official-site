      <h1 class="eyebrow">何時合作</h1>
      <p>在以下情況下與我們合作：</p>
      <ul class="fit-list">
        <li>您正在從零開始構建產品，需要堅實的技術基礎</li>
        <li>您需要擴展您的團隊或容量，但不想承擔全職員工的負擔</li>
        <li>可靠性、可觀測性或 SRE 實踐變得至關重要</li>
        <li>您想要重構、降低技術債務或改進性能</li>
        <li>您在尋找長期的技術夥伴，而不是一次性的外包商</li>
      </ul>
      <p class="fit-conclusion">
        當您準備好時，<span class="fit-brand">AIDARIS</span> 就在這裡。
      </p>
