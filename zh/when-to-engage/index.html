    <div class="fit-content hero-content">
      <h1 class="eyebrow">何時合作</h1>
      <p>在以下情況下與我們合作：</p>
      <ul class="fit-list">
        <li>您正從零開始建設產品，需要強大的技術基礎</li>
        <li>您需要擴展團隊或容量，而無需全職聘用的開銷</li>
        <li>可靠性、可觀測性或 SRE 實踐變得至關重要</li>
        <li>您想重構、降低技術債務或改進效能</li>
        <li>您在尋找長期技術合作夥伴，而不是一次性供應商</li>
      </ul>
      <p class="fit-conclusion">
        無論您何時準備好，<span class="fit-brand">AIDARIS</span> 都在這裡。
      </p>
